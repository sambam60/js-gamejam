<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>SHAPESCAPE</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game-wrapper">
  <div id="canvas-container">
    <canvas id="game"></canvas>
    <canvas id="crt-overlay" aria-hidden="true"></canvas>
    <div id="scanlines"></div>
    <div id="vignette"></div>
  </div>
  <input id="menu-text-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" aria-hidden="true" tabindex="-1" />
  <div id="hotbar"></div>
  <div id="mobile-controls">
    <div class="mobile-row mobile-row-mods">
      <button type="button" id="btn-sprint" aria-label="Sprint">Sprint</button>
      <button type="button" id="btn-crouch" aria-label="Crouch">Crouch</button>
    </div>
    <div class="mobile-row mobile-row-move">
      <button type="button" id="btn-left" aria-label="Move left">&#9664;</button>
      <button type="button" id="btn-right" aria-label="Move right">&#9654;</button>
      <button type="button" id="btn-pause" aria-label="Pause">&#9776;</button>
      <button type="button" id="btn-jump" aria-label="Jump">Jump</button>
    </div>
  </div>
</div>

<script src="haptics.js"></script>
<script src="bugs.js"></script>
<script src="danglies.js"></script>
<script src="crt-shader.js"></script>
<script src="leaderboard.js"></script>
<script src="multiplayer-bridge.js"></script>
<script src="game.js"></script>
</body>
</html>
